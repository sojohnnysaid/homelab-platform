apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-mirai-marketing
  namespace: argocd
  labels:
    env: dev
    domain: mirai
    tier: frontend
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mirai-dev
  source:
    repoURL: https://github.com/Sogos-LLC/mirai-app.git
    targetRevision: dev
    path: k8s-local-dev/frontend-marketing
  destination:
    server: https://kubernetes.default.svc
    namespace: mirai-loc-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
