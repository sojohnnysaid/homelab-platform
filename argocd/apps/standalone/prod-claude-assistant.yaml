apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-claude-assistant
  namespace: argocd
  labels:
    env: prod
    domain: standalone
    tier: backend
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab-apps
  source:
    repoURL: https://github.com/sojohnnysaid/claude-assistant.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: claude-assistant
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
