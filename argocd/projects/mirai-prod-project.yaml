apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: mirai-prod
  namespace: argocd
spec:
  description: Mirai production applications
  sourceRepos:
    - 'https://github.com/Sogos-LLC/mirai-app.git'
    - 'https://github.com/sojohnnysaid/mirai-app.git'
  destinations:
    - namespace: mirai
      server: https://kubernetes.default.svc
    - namespace: redis
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  namespaceResourceBlacklist:
    - group: ''
      kind: ResourceQuota
    - group: ''
      kind: LimitRange
