apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mirai-uat-apps
  namespace: argocd
  labels:
    env: uat
    domain: mirai
    tier: infra
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform
  source:
    repoURL: https://github.com/sojohnnysaid/homelab-platform.git
    targetRevision: main
    path: argocd/apps/mirai-uat
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
